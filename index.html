<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Legacy</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0a0a0a;
color:white;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

h1{
font-size:5rem;
letter-spacing:10px;
margin-bottom:20px;
}

p{
max-width:700px;
font-size:1.2rem;
color:#bdbdbd;
}

.btn{
margin-top:40px;
padding:15px 35px;
border:1px solid white;
text-decoration:none;
color:white;
transition:.3s;
}

.btn:hover{
background:white;
color:black;
}
</style>

</head>
<body>

<section class="hero">
<h1>URBAN LEGACY</h1>

<p>
Premium Streetwear.
Built for the streets.
Designed to leave a legacy.
</p>

<a href="#" class="btn">EXPLORE</a>

</section>

</body>
</html>
